<svg width="24" height="24" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
    <!-- Eye of Thoth - activity bar icon -->
    <!-- Upper lid -->
    <path d="M2 12C2 12 6 6 12 6s10 6 10 6" stroke="#b0b0b0" stroke-width="1.6" fill="none" stroke-linecap="round"/>
    <!-- Lower lid -->
    <path d="M2 12C2 12 6 18 12 18s10-6 10-6" stroke="#b0b0b0" stroke-width="1.6" fill="none" stroke-linecap="round"/>
    <!-- Iris -->
    <circle cx="12" cy="12" r="3.5" stroke="#b0b0b0" stroke-width="1.4" fill="none"/>
    <!-- Pupil diamond -->
    <path d="M12 9.8L13.5 12 12 14.2 10.5 12Z" fill="#b0b0b0"/>
    <!-- Teardrop / hieroglyph tail -->
    <path d="M12 18l-1 2.5c0 0.8 0.5 1.5 1 1.5s1-0.7 1-1.5L12 18z" fill="#b0b0b0" opacity="0.7"/>
    <!-- Brow accent -->
    <path d="M5 7.5C7 5 9.5 4 12 4s5 1 7 3.5" stroke="#b0b0b0" stroke-width="1" fill="none" stroke-linecap="round" opacity="0.4"/>
</svg>
